# Jarvis configuration. Copy this file to config.yaml and edit.
# Environment variables: any value can use ${VAR_NAME} to pull from the env.

# Mode: "voice" (wake-word + STT + TTS) or "text" (type commands, see replies)
mode: voice


# =========================================================================
# LLM backend
# =========================================================================
llm:
  # Pick ONE: claude_agent | claude_api | openai_compat
  backend: claude_agent

  # ---- For backend: claude_agent ----
  # Uses your Claude Pro/Max subscription via Claude Code — no API key needed.
  # Requires Claude Code installed and logged in on this machine.
  model: claude-sonnet-4-6

  # ---- For backend: claude_api ----
  # Uncomment and set when using claude_api.
  # api_key: ${ANTHROPIC_API_KEY}

  # ---- For backend: openai_compat ----
  # Works with any OpenAI-compatible API. Examples:
  #   OpenAI    : base_url=https://api.openai.com/v1            model=gpt-4o-mini
  #   xAI/Grok  : base_url=https://api.x.ai/v1                  model=grok-4
  #   Groq      : base_url=https://api.groq.com/openai/v1       model=llama-3.3-70b-versatile
  #   Ollama    : base_url=http://localhost:11434/v1            model=llama3.1
  #   LM Studio : base_url=http://localhost:1234/v1             model=<your local model>
  # base_url: https://api.openai.com/v1
  # api_key: ${OPENAI_API_KEY}

  # Maximum response tokens. Voice replies should be short.
  max_tokens: 1024


# =========================================================================
# Persona
# =========================================================================
persona:
  # Optional: path to a markdown file with personal context the assistant
  # should "know" across sessions. Copy memory.example.md → memory.md and
  # edit. Lines wrapped in HTML comments are ignored, so the example file
  # serves as a fill-in-the-blanks template. Jarvis can also write learned
  # facts back to this file via the `remember` tool (see tools.memory below).
  # Set to null or remove this line to disable.
  memory_file: memory.md

  system_prompt: |
    You are JARVIS — a personal voice assistant inspired by Tony Stark's AI.

    This is a fully voice conversation. The user SPEAKS to you (their speech
    is transcribed by Whisper) and HEARS your replies (synthesized by TTS).
    Behave accordingly:
    - Expect missing punctuation, occasional mistranscriptions, homophones.
      Interpret charitably; only ask for clarification when meaning is truly
      ambiguous.
    - Reply in natural spoken English: no markdown, no bullet points, no
      code blocks, no headings, no asterisks for emphasis.
    - Read numbers, units, and symbols the way you'd say them.
      "Three p.m." not "3:00 PM". "Fifty percent" not "50%".
    - Keep replies short and useful.

    Personality:
    - Dry British wit, understated, occasionally cheeky.
    - Address the user as "sir" (or "ma'am" if corrected).
    - Confident, not sycophantic. Push back politely when the user is wrong.
    - When you don't know something, say so plainly.

    Tool usage:
    - When asked to play music, open an app, change a window, etc. — ACTUALLY
      CALL THE TOOL. Don't just say you would.
    - After a tool call, give a brief one-line spoken confirmation.
    - Never read URLs, video IDs, or AppIDs aloud.


# =========================================================================
# Voice
# =========================================================================
voice:
  # Wake word — Jarvis listens for this between commands.
  wake_word: jarvis

  # Mishearings to ALSO count as the wake word. Whisper often hears "jarvis"
  # as one of these on short utterances. Trade-off: bigger list = more
  # responsive, but more false triggers from normal speech.
  wake_word_variants:
    - jarvis
    - jervis
    - jervice
    - service
    - travis
    - harvest

  # Seconds of silence after speech ends → command is complete.
  silence_end_seconds: 2.5

  # Hard cap on one command's length, in seconds.
  max_command_seconds: 30

  # If no speech detected after wake word within this many seconds, give up
  # and go back to listening.
  command_giveup_seconds: 6

  stt:
    # Whisper model for command transcription.
    # tiny.en (~40MB, fastest), base.en (~75MB, balanced),
    # small.en (~250MB, accurate), medium.en (~770MB, very accurate).
    model: base.en

    # Smaller dedicated model used only for wake-word detection. This runs
    # constantly, so keep it small. tiny.en is the sweet spot.
    wake_model: tiny.en

  tts:
    enabled: true
    # Edge TTS voice. Run `edge-tts --list-voices` to see all available.
    voice: en-GB-RyanNeural


# =========================================================================
# Tools — each module is independently enableable
# =========================================================================
tools:

  memory:
    # Lets Jarvis read/write your memory.md (see persona.memory_file above).
    # remember(fact) appends to the "# Learned" section. forget(matching)
    # removes entries from that section. Your hand-written sections are
    # never touched by the tool.
    enabled: true
    path: memory.md

  system_info:
    enabled: true

  web_browser:
    enabled: true

  music_ytmd:
    # YouTube Music control via th-ch/youtube-music desktop app.
    # See README for setup. Off by default — install the app first.
    enabled: false

    # Local API server port (default 26538). Only change if you changed
    # the port in the app's API Server plugin settings.
    port: 26538

    # Optional: absolute path to youtube-music.exe so Jarvis can auto-launch
    # it when not already running. Leave null to manage the app yourself.
    # Example: C:\Users\YOU\AppData\Local\YouTube Music\youtube-music.exe
    exe_path: null

  windows_apps:
    # Launch any app from the Windows Start Menu by name. Windows-only.
    enabled: true

  windows_state:
    # Minimize / maximize / close / focus windows. Windows-only.
    enabled: true


  # =======================================================================
  #  ⚠️  DANGER ZONE — read carefully before enabling
  # =======================================================================
  # The dangerous_shell tools give the LLM full shell access (run_shell)
  # and read/write access to any file on disk (read_file / write_file /
  # list_directory). This is the kind of capability JARVIS-from-the-movies
  # has, and the kind that can wipe your data if Whisper mishears you, if
  # a prompt injection lands, or if the model just makes a mistake.
  #
  # To enable, you MUST set BOTH flags below to true. Either one alone is
  # not enough — that's intentional friction.
  #
  # Admin / elevation:
  #   These tools run at whatever privilege level Jarvis itself is running
  #   at. To give Jarvis admin access, right-click your terminal →
  #   Run as administrator BEFORE starting jarvis.py. The admin status is
  #   logged at startup.
  #
  # See the README's "Danger Zone" section for the full risk discussion.
  # =======================================================================
  dangerous_shell:
    enabled: false                  # off by default
    i_understand_the_risks: false   # MUST also be true for tools to load

    # Which shell to use for run_shell. Windows: 'powershell' or 'cmd'.
    # Linux/macOS: 'bash' (or 'sh', 'zsh', etc.).
    shell: powershell

    # Hard timeout per command. Keep modest — a runaway loop would otherwise
    # hang Jarvis. Bump if you legitimately need long-running commands.
    timeout_seconds: 60

    # Max chars of stdout+stderr returned to the LLM. Truncated tail is
    # marked. Prevents huge outputs from blowing up your context.
    max_output_chars: 4000


# =========================================================================
# Logging
# =========================================================================
logging:
  # Always writes the full DEBUG log to this file (overwritten each run).
  file: jarvis.log

  # Mirror logs to the terminal? Useful for debugging. CLI --debug forces on.
  mirror_to_terminal: false
