name: Build installer

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'installer/**'
      - 'dotnet/**'
      - '.github/workflows/installer.yml'
  workflow_dispatch:

# softprops/action-gh-release needs write access to create/edit releases.
permissions:
  contents: write

jobs:
  # =========================================================================
  #  Python edition: WPF installer + Settings.exe (existing artifacts)
  # =========================================================================
  build-python-edition:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: installer
        run: dotnet restore Jarvis.Installer.sln

      - name: Publish JarvisSettings.exe
        working-directory: installer
        run: >
          dotnet publish src/Jarvis.Settings/Jarvis.Settings.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/settings

      - name: Publish JarvisInstaller.exe
        working-directory: installer
        run: >
          dotnet publish src/Jarvis.Installer/Jarvis.Installer.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/installer

      - name: Stage Python-edition artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts-python -Force | Out-Null
          Copy-Item installer/publish/installer/JarvisInstaller.exe artifacts-python/
          Copy-Item installer/publish/settings/JarvisSettings.exe   artifacts-python/
          Get-ChildItem artifacts-python | Format-Table Name, Length

      - name: Upload Python-edition artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-python
          path: artifacts-python/*.exe
          if-no-files-found: error

  # =========================================================================
  #  .NET edition: Jarvis-NET.exe (Phase 1 — installer/settings come Phase 2)
  # =========================================================================
  build-dotnet-edition:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: dotnet
        run: dotnet restore Jarvis.NET.sln

      - name: Publish Jarvis-NET.exe
        working-directory: dotnet
        run: >
          dotnet publish src/Jarvis.App/Jarvis.App.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/app

      - name: Stage .NET-edition artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts-dotnet -Force | Out-Null
          Copy-Item dotnet/publish/app/Jarvis-NET.exe artifacts-dotnet/
          Get-ChildItem artifacts-dotnet | Format-Table Name, Length

      - name: Upload .NET-edition artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-dotnet
          path: artifacts-dotnet/*.exe
          if-no-files-found: error

  # =========================================================================
  #  Release job: only on tag push, combines both editions' artifacts
  # =========================================================================
  release:
    needs: [build-python-edition, build-dotnet-edition]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download Python-edition artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-python
          path: combined/
      - name: Download .NET-edition artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-dotnet
          path: combined/
      - name: Attach all artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: combined/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
